<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Zombie Survival</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<!-- Overlay portrait -->
<div id="rotate-screen">
  <div>
    <div id="rotate-icon">📱</div>
    <p>Tournez votre écran<br>en mode paysage</p>
  </div>
</div>

<div id="connecting-screen">Connexion au serveur...</div>

<canvas id="game-canvas"></canvas>

<!-- HUD -->
<div id="hud">
  <div id="health-bar-wrap">
    <span id="health-icon">❤️</span>
    <div id="health-bar-bg"><div id="health-bar"></div></div>
    <span id="health-text">100</span>
  </div>
  <div id="kills-display">☠️ <span id="kills-count">0</span></div>
  <div id="ammo-display">🔫 <span id="ammo-count">30</span></div>
  <div id="crosshair"></div>
  <div id="damage-flash"></div>
  <div id="wave-banner"></div>
</div>

<!-- Mobile zones -->
<div id="left-zone"></div>
<div id="right-zone"></div>

<!-- Boutons flottants (après les zones pour être au-dessus) -->
<button id="logout-btn" onclick="ZS.logout()">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
    <polyline points="16 17 21 12 16 7"/>
    <line x1="21" y1="12" x2="9" y2="12"/>
  </svg>
</button>
<button id="jump-btn">⬆</button>
<button id="shoot-btn">🔫</button>

<!-- Hotbar -->
<div id="hotbar"></div>

<!-- Use item button (visible when consumable/ammo selected) -->
<button id="use-btn" style="display:none">Utiliser</button>

<!-- Pickup notification -->
<div id="pickup-notif"></div>

<!-- Death screen -->
<div id="death-screen">
  <h2>MORT</h2>
  <p id="death-kills"></p>
  <button id="respawn-btn">Réapparaître</button>
</div>

<!-- Libraries -->
<script src="/socket.io/socket.io.js"></script>
<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>

<!-- Game modules (order matters) -->
<script src="/js/noise.js"></script>
<script src="/js/world.js"></script>
<script src="/js/player.js"></script>
<script src="/js/zombie.js"></script>
<script src="/js/network.js"></script>
<script src="/js/ui.js"></script>
<script src="/js/inventory.js"></script>
<script src="/js/game.js"></script>

</body>
</html>
