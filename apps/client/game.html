<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Zombie Survival</title>
  <script>
  (function () {
    'use strict';
    var GUARD = 'zs_version_reloading';
    var KEY = 'zs_client_version';

    function clearCaches() {
      if (navigator.serviceWorker && navigator.serviceWorker.getRegistrations) {
        navigator.serviceWorker.getRegistrations().then(function (regs) {
          regs.forEach(function (r) { r.unregister(); });
        });
      }
      if (!window.caches || !caches.keys) return Promise.resolve();
      return caches.keys().then(function (names) {
        return Promise.all(names.map(function (n) { return caches.delete(n); }));
      });
    }

    function applyVersion(v) {
      window.__ZS_CLIENT_VERSION = v;
      var css = document.getElementById('zs-css');
      if (css) css.href = '/css/style.css?v=' + encodeURIComponent(v);
      if (!document.getElementById('zs-loading-js')) {
        var s = document.createElement('script');
        s.id = 'zs-loading-js';
        s.src = '/js/loading.js?v=' + encodeURIComponent(v);
        document.head.appendChild(s);
      }
      window.dispatchEvent(new Event('zs-client-version'));
    }

    function finish(stored, serverVer) {
      if (sessionStorage.getItem(GUARD)) {
        sessionStorage.removeItem(GUARD);
        localStorage.setItem(KEY, serverVer);
        applyVersion(serverVer);
        return;
      }
      if (stored && stored !== serverVer) {
        sessionStorage.setItem(GUARD, '1');
        localStorage.setItem(KEY, serverVer);
        clearCaches().then(function () {
          location.replace(
            location.pathname + '?v=' + encodeURIComponent(serverVer) + '&_=' + Date.now() + (location.hash || ''),
          );
        });
        return;
      }
      localStorage.setItem(KEY, serverVer);
      applyVersion(serverVer);
    }

    fetch('/api/client-version?_=' + Date.now(), { cache: 'no-store', credentials: 'same-origin' })
      .then(function (r) { return r.json(); })
      .then(function (d) { finish(localStorage.getItem(KEY), d.version || '__CLIENT_VERSION__'); })
      .catch(function () { finish(localStorage.getItem(KEY), '__CLIENT_VERSION__'); });
  })();
  </script>
  <link id="zs-css" rel="stylesheet" href="/css/style.css">
</head>
<body>

<!-- Overlay portrait -->
<div id="rotate-screen">
  <div>
    <div id="rotate-icon">📱</div>
    <p>Tournez votre écran<br>en mode paysage</p>
  </div>
</div>

<div id="connecting-screen">

    <div class="connecting-spinner" aria-hidden="true"></div>
    <p id="connecting-msg">Connexion au serveur…</p>
    <div class="connecting-progress-wrap" aria-hidden="true">
      <div class="connecting-progress-track">
        <div id="connecting-progress-bar" class="connecting-progress-bar"></div>
      </div>
      <span id="connecting-progress-pct" class="connecting-progress-pct">0%</span>
    </div>
    <small id="connecting-detail"></small>
  </div>
</div>

<canvas id="game-canvas"></canvas>

<div id="pc-play-hint" aria-hidden="true">

  <small>WASD · souris · Échap pour libérer le curseur</small>
</div>

<div id="chat-wrap" aria-live="polite">

  <div id="chat-input-row" hidden>
    <input id="chat-input" type="text" maxlength="200" enterkeyhint="send"
      autocapitalize="off" autocomplete="off" autocorrect="off" spellcheck="false"
      placeholder="Message…" />
    <button id="chat-send-btn" type="button" title="Envoyer">➤</button>
  </div>
</div>

<!-- HUD -->

    <div id="health-bar-bg"><div id="health-bar"></div></div>
    <span id="health-text">100</span>
  </div>
  <div id="hunger-bar-wrap">
    <span style="font-size:1rem">🍗</span>
    <div id="hunger-bar-bg"><div id="hunger-bar"></div></div>
    <span id="hunger-text" class="stat-text">80</span>
  </div>
  <div id="thirst-bar-wrap">
    <span style="font-size:1rem">💧</span>
    <div id="thirst-bar-bg"><div id="thirst-bar"></div></div>
    <span id="thirst-text" class="stat-text">80</span>
  </div>
  <div id="infection-bar-wrap" style="display:none">

    <span class="stat-text" style="color:#88ff88">Infection</span>
  </div>
  <div id="status-effects"></div>
  <div id="hud-stats-tr">
    <div id="online-display" title="Joueurs en ligne">👥 <span id="online-count">1</span></div>
    <div id="kills-display">☠️ <span id="kills-count">0</span></div>
  </div>
  <div id="ammo-display">🔫 <span id="ammo-count">30</span></div>
  <div id="crosshair"></div>
  <div id="damage-flash"></div>
  <div id="wave-banner"></div>
</div>

<!-- Mobile zones -->
<div id="left-zone"></div>
<div id="right-zone"></div>

</div>

<!-- Libraries -->
<script src="/socket.io/socket.io.js"></script>

<!-- THREE via modules ES (instance unique) + GLTFLoader pour les modèles .glb -->
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
<script type="module">
  import * as THREE from 'three';
  import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
  // Exposer THREE en global pour les scripts classiques du jeu.
  // NB: l'objet `import * as THREE` est scellé (non extensible) — on en fait
  // une copie mutable pour pouvoir y attacher GLTFLoader.
  window.THREE = { ...THREE, GLTFLoader };

  function setConnectingMsg(msg, detail, pct) {
    const api = window.__zsLoading || window.ZS?.Loading;
    if (api?.setProgress && typeof pct === 'number') {
      api.setProgress(pct, msg, detail);
      return;
    }
    const m = document.getElementById('connecting-msg');
    const d = document.getElementById('connecting-detail');
    const bar = document.getElementById('connecting-progress-bar');
    const pEl = document.getElementById('connecting-progress-pct');
    if (m) m.textContent = msg || '';
    if (d) d.textContent = detail || '';
    if (typeof pct === 'number') {
      if (bar) bar.style.width = `${Math.round(pct)}%`;
      if (pEl) pEl.textContent = `${Math.round(pct)}%`;
    }
    document.getElementById('connecting-screen').style.display = 'flex';
  }

  const BOOT_LABELS = {
    starting: 'Démarrage du serveur…',
    zombies: 'Population zombie…',
    spawn_decor: 'Camp de spawn…',
    road_wrecks: 'Épaves routières…',
    road_barriers: 'Barrières routières…',
    camp_rocks: 'Rochers du camp…',
    world_rocks: 'Rochers du monde…',
    world_trees: 'Forêt…',
    listening: 'Ouverture du port…',
  };

  async function waitForServer() {
    let attempt = 0;
    const maxAttempts = 120;
    while (attempt < maxAttempts) {
      attempt++;
      try {
        const r = await fetch('/api/health', { cache: 'no-store' });
        if (r.status === 404) {
          setConnectingMsg('Chargement du jeu…', 'Serveur sans endpoint health — chargement direct', 12);
          return;
        }
        const data = await r.json().catch(() => ({}));
        if (data.ready) {
          setConnectingMsg('Chargement du jeu…', 'Serveur prêt', 12);
          return;
        }
        const boot = data.boot || {};
        const phase = boot.phase || 'starting';
        const bootPct = Number.isFinite(boot.progress) ? boot.progress : 0;
        const progress = Math.min(11, bootPct);
        setConnectingMsg(
          BOOT_LABELS[phase] || 'Serveur en cours de démarrage…',
          `Initialisation (${attempt}/${maxAttempts})…`,
          progress,
        );
      } catch {
        setConnectingMsg(
          'Serveur indisponible…',
          `Vérifiez que Node.js tourne sur le port 3000 (${attempt}/${maxAttempts})`,
          Math.min(8, attempt),
        );
      }
      await new Promise((resolve) => setTimeout(resolve, 1000));
    }
    setConnectingMsg('Chargement du jeu…', 'Délai dépassé — tentative de connexion quand même', 12);
  }

  const CACHE_BUST = window.__ZS_CLIENT_VERSION || '__CLIENT_VERSION__';

  async function waitForClientVersion() {
    if (window.__ZS_CLIENT_VERSION) return window.__ZS_CLIENT_VERSION;
    return new Promise((resolve) => {
      window.addEventListener('zs-client-version', () => resolve(window.__ZS_CLIENT_VERSION), { once: true });
    });
  }

  // Attendre la version client (purge cache auto si update), puis le serveur, puis les scripts legacy.
  (async () => {
    setConnectingMsg('Connexion au serveur…', 'Vérification de la version', 0);
    await waitForClientVersion();
    await waitForServer();
    const { LEGACY_MODULES } = await import('/src/bootstrap/legacy-modules.js');
    const modules = LEGACY_MODULES.filter((src) => !src.includes('loading.js'));
    const scriptMin = 12;
    const scriptMax = 22;
    for (let i = 0; i < modules.length; i++) {
      const src = modules[i];
      const local = (i + 1) / modules.length;
      const pct = scriptMin + (scriptMax - scriptMin) * local;
      setConnectingMsg(
        'Chargement des modules…',
        `${i + 1} / ${modules.length}`,
        pct,
      );
      await new Promise((resolve, reject) => {
        const s = document.createElement('script');
        s.src = src + (src.includes('?') ? '&' : '?') + 'v=' + CACHE_BUST;
        s.onload = resolve;
        s.onerror = () => reject(new Error('Échec du chargement de ' + src));
        document.body.appendChild(s);
      });
    }
    window.ZS?.Loading?.setPhase?.('scripts', 1, 'Modules chargés', '');
  })().catch(err => {
    console.error(err);
    setConnectingMsg('Erreur de chargement', err.message || String(err));
  });
</script>

</body>
</html>
