<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Zombie Survival</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<!-- Overlay portrait -->
<div id="rotate-screen">
  <div>
    <div id="rotate-icon">📱</div>
    <p>Tournez votre écran<br>en mode paysage</p>
  </div>
</div>

<div id="connecting-screen">
  <div class="connecting-inner">
    <div class="connecting-spinner" aria-hidden="true"></div>
    <p id="connecting-msg">Connexion au serveur…</p>
    <small id="connecting-detail"></small>
  </div>
</div>

<canvas id="game-canvas"></canvas>

<div id="pc-play-hint" aria-hidden="true">
  <span>Cliquez pour jouer</span>
  <small>WASD · souris · Échap pour libérer le curseur</small>
</div>

<div id="chat-wrap" aria-live="polite">
  <div id="chat-log"></div>
  <div id="chat-input-row" hidden>
    <input id="chat-input" type="text" maxlength="200" enterkeyhint="send"
      autocapitalize="off" autocomplete="off" autocorrect="off" spellcheck="false"
      placeholder="Message…" />
    <button id="chat-send-btn" type="button" title="Envoyer">➤</button>
  </div>
</div>

<!-- HUD -->
<div id="hud">
  <div id="health-bar-wrap">
    <span id="health-icon">❤️</span>
    <div id="health-bar-bg"><div id="health-bar"></div></div>
    <span id="health-text">100</span>
  </div>
  <div id="hunger-bar-wrap">
    <span style="font-size:1rem">🍗</span>
    <div id="hunger-bar-bg"><div id="hunger-bar"></div></div>
    <span id="hunger-text" class="stat-text">80</span>
  </div>
  <div id="thirst-bar-wrap">
    <span style="font-size:1rem">💧</span>
    <div id="thirst-bar-bg"><div id="thirst-bar"></div></div>
    <span id="thirst-text" class="stat-text">80</span>
  </div>
  <div id="infection-bar-wrap" style="display:none">
    <span style="font-size:1rem">🦠</span>
    <div id="infection-bar-bg"><div id="infection-bar"></div></div>
    <span class="stat-text" style="color:#88ff88">Infection</span>
  </div>
  <div id="status-effects"></div>
  <div id="hud-stats-tr">
    <div id="online-display" title="Joueurs en ligne">👥 <span id="online-count">1</span></div>
    <div id="kills-display">☠️ <span id="kills-count">0</span></div>
  </div>
  <div id="ammo-display">🔫 <span id="ammo-count">30</span></div>
  <div id="crosshair"></div>
  <div id="damage-flash"></div>
  <div id="wave-banner"></div>
</div>

<!-- Mobile zones -->
<div id="left-zone"></div>
<div id="right-zone"></div>

<!-- Boutons flottants (après les zones pour être au-dessus) -->
<button id="menu-btn" title="Menu">☰</button>
<div id="menu-panel" style="display:none">
  <button id="menu-audio" class="menu-item">🔊 Son : activé</button>
  <button id="menu-console" class="menu-item menu-console-item menu-console-hidden" type="button">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/>
    </svg>
    Console dev
  </button>
  <button id="menu-logout" class="menu-item danger">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
      <polyline points="16 17 21 12 16 7"/>
      <line x1="21" y1="12" x2="9" y2="12"/>
    </svg>
    Se déconnecter
  </button>
</div>
<button id="chat-btn" title="Chat — écrire" type="button">💬</button>
<button id="jump-btn">⬆</button>
<button id="shoot-btn">🔫</button>
<button id="reload-btn" title="Recharger [R]" style="display:none">⟳</button>
<button id="craft-btn" title="Artisanat [C]">⚒</button>
<button id="inv-btn"   title="Inventaire [I]" onclick="ZS.Inventory.togglePanel()">🎒</button>
<button id="map-btn"   title="Carte [M]"      onclick="ZS.Map.toggleMap()">🗺️</button>

<!-- Hotbar -->
<div id="hotbar"></div>

<!-- Use item button (visible when consumable/ammo selected) -->
<button id="use-btn" style="display:none">Utiliser</button>

<!-- Grab item button (visible quand un objet est à portée de ramassage) -->
<button id="grab-btn" style="display:none">✋ Ramasser</button>

<!-- Pickup notification -->
<div id="pickup-notif"></div>

<!-- Map overlay -->
<div id="map-overlay" style="display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.82);flex-direction:column;align-items:center;justify-content:center;overflow:auto;padding:6px;">
  <div style="position:relative;flex-shrink:0;background:#c8b060;border:4px solid #7a5020;box-shadow:0 0 60px rgba(0,0,0,0.6),inset 0 0 30px rgba(0,0,0,0.12);transform:rotate(-0.5deg);max-width:96vw;">
    <!-- Bouton fermer MOBILE-FRIENDLY en haut, toujours visible -->
    <button id="map-close-btn" style="position:absolute;top:-1px;right:-1px;background:rgba(40,15,5,0.95);color:#e8d090;border:none;border-bottom-left-radius:8px;padding:10px 18px;cursor:pointer;font-size:16px;font-family:Georgia,serif;z-index:10;min-width:52px;min-height:44px;touch-action:manipulation;">✕</button>
    <canvas id="map-canvas" width="800" height="580" style="display:block;max-width:96vw;max-height:84vh;width:auto;height:auto;"></canvas>
  </div>
  <p style="color:#d4b860;font-family:Georgia,serif;font-size:11px;margin-top:6px;opacity:0.6;text-align:center;flex-shrink:0;width:100%">Touchez en dehors ou ✕ pour fermer</p>
</div>

<!-- Death screen -->
<div id="death-screen">
  <h2>MORT</h2>
  <p id="death-kills"></p>
  <button id="respawn-btn">Réapparaître</button>
</div>

<!-- Libraries -->
<script src="/socket.io/socket.io.js"></script>

<!-- THREE via modules ES (instance unique) + GLTFLoader pour les modèles .glb -->
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
<script type="module">
  import * as THREE from 'three';
  import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
  // Exposer THREE en global pour les scripts classiques du jeu.
  // NB: l'objet `import * as THREE` est scellé (non extensible) — on en fait
  // une copie mutable pour pouvoir y attacher GLTFLoader.
  window.THREE = { ...THREE, GLTFLoader };

  function setConnectingMsg(msg, detail) {
    const m = document.getElementById('connecting-msg');
    const d = document.getElementById('connecting-detail');
    if (m) m.textContent = msg || '';
    if (d) d.textContent = detail || '';
    document.getElementById('connecting-screen').style.display = 'flex';
  }

  async function waitForServer() {
    let attempt = 0;
    const maxAttempts = 120;
    while (attempt < maxAttempts) {
      attempt++;
      try {
        const r = await fetch('/api/health', { cache: 'no-store' });
        if (r.status === 404) {
          setConnectingMsg('Chargement du jeu…', 'Serveur sans endpoint health — chargement direct');
          return;
        }
        const data = await r.json().catch(() => ({}));
        if (data.ready) {
          setConnectingMsg('Chargement du jeu…', '');
          return;
        }
        setConnectingMsg(
          'Serveur en cours de démarrage…',
          `Patientez (${attempt}/${maxAttempts})…`
        );
      } catch {
        setConnectingMsg(
          'Serveur indisponible…',
          `Vérifiez que Node.js tourne sur le port 3000 (${attempt}/${maxAttempts})`
        );
      }
      await new Promise((resolve) => setTimeout(resolve, 1000));
    }
    setConnectingMsg('Chargement du jeu…', 'Délai dépassé — tentative de connexion quand même');
  }

  const CACHE_BUST = '20260606-rcon-prefabs-wrecks-building-01';
  // Attendre le serveur, puis charger les scripts legacy via le manifeste Vite.
  (async () => {
    await waitForServer();
    const { LEGACY_MODULES } = await import('/src/bootstrap/legacy-modules.js');
    const modules = LEGACY_MODULES;
    for (const src of modules) {
      await new Promise((resolve, reject) => {
        const s = document.createElement('script');
        s.src = src + (src.includes('?') ? '&' : '?') + 'v=' + CACHE_BUST;
        s.onload = resolve;
        s.onerror = () => reject(new Error('Échec du chargement de ' + src));
        document.body.appendChild(s);
      });
    }
  })().catch(err => {
    console.error(err);
    setConnectingMsg('Erreur de chargement', err.message || String(err));
  });
</script>

</body>
</html>
