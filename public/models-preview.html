<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Items 3D — Aperçu / Calibrage</title>
<style>
  html, body { margin: 0; height: 100%; background: #14181d; color: #cdd6e0;
    font-family: system-ui, sans-serif; overflow: hidden; }
  #c { position: fixed; inset: 0; display: block; }
  #hud { position: fixed; top: 10px; left: 12px; font-size: 13px; line-height: 1.6;
    background: rgba(0,0,0,.45); padding: 10px 14px; border-radius: 8px; max-width: 320px; }
  #hud b { color: #ffd27a; }
  #labels { position: fixed; inset: 0; pointer-events: none; }
  .lbl { position: absolute; transform: translate(-50%, 8px); font-size: 11px;
    color: #fff; text-shadow: 0 1px 2px #000; white-space: nowrap; text-align: center; }
  .lbl small { color: #8fb3ff; }
  kbd { background:#2a313a;border-radius:4px;padding:1px 5px;border:1px solid #3a434f; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="labels"></div>
<div id="hud">
  <b>Aperçu des items 3D en main</b><br>
  Glisser = tourner · molette = zoom · clic droit = déplacer<br>
  <kbd>A</kbd> axes (rouge=X, vert=Y, bleu=Z) · <kbd>R</kbd> rotation auto<br>
  <span id="status">chargement…</span>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ⚠️ Doit rester synchronisé avec la table GLB de public/js/player.js
const GLB = {
  wpn_pistolet:        { file: 'pistol',        fit: 0.34, rot: [0, Math.PI / 2, 0] },
  wpn_fusil_pompe:     { file: 'shotgun',       fit: 0.60, rot: [0, Math.PI / 2, 0] },
  wpn_fusil_chasse:    { file: 'sniper_rifle',  fit: 0.70, rot: [0, Math.PI / 2, 0] },
  wpn_couteau:         { file: 'knife',         fit: 0.30, rot: [0, 0, 0] },
  wpn_hache_combat:    { file: 'axe',           fit: 0.50, rot: [0, 0, 0] },
  tool_pioche:         { file: 'shovel',        fit: 0.55, rot: [0, 0, 0] },
  tool_torche:         { file: 'wooden_torch',  fit: 0.50, rot: [0, 0, 0] },
  food_eau_bouteille:  { file: 'water_bottle',  fit: 0.20, rot: [0, 0, 0] },
  food_conserves:      { file: 'can',           fit: 0.14, rot: [0, 0, 0] },
  food_haricots_boite: { file: 'can_red',       fit: 0.14, rot: [0, 0, 0] },
  food_soupe_conserve: { file: 'can_broken',    fit: 0.14, rot: [0, 0, 0] },
  med_kit_soin:        { file: 'first_aid_kit', fit: 0.20, rot: [0, 0, 0] },
  res_bois_brut:       { file: 'wood_log',      fit: 0.26, rot: [0, 0, 0] },
  eq_grand_sac:        { file: 'backpack',      fit: 0.34, rot: [0, Math.PI, 0] },
};

const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('c'), antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x14181d);
const camera = new THREE.PerspectiveCamera(50, innerWidth / innerHeight, 0.01, 100);
camera.position.set(0, 0.9, 2.4);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 0.2, 0);

scene.add(new THREE.AmbientLight(0xffffff, 0.7));
const dir = new THREE.DirectionalLight(0xffffff, 1.1);
dir.position.set(2, 4, 3); scene.add(dir);
const grid = new THREE.GridHelper(6, 12, 0x334, 0x223); grid.position.y = -0.4; scene.add(grid);

function fitClone(template, fit, rot) {
  const obj = template.clone(true);
  const box = new THREE.Box3().setFromObject(obj);
  const size = new THREE.Vector3(); box.getSize(size);
  const center = new THREE.Vector3(); box.getCenter(center);
  const s = fit / (Math.max(size.x, size.y, size.z) || 1);
  obj.scale.setScalar(s);
  obj.position.set(-center.x * s, -center.y * s, -center.z * s);
  const centered = new THREE.Group(); centered.add(obj);
  const pivot = new THREE.Group(); pivot.add(centered);
  if (rot) pivot.rotation.set(rot[0] || 0, rot[1] || 0, rot[2] || 0);
  return pivot;
}

const loader = new GLTFLoader();
const entries = Object.entries(GLB);
const cols = Math.ceil(Math.sqrt(entries.length));
const gap = 0.85;
const cells = [];
const labelsEl = document.getElementById('labels');

let loaded = 0;
entries.forEach(([type, spec], i) => {
  const col = i % cols, row = Math.floor(i / cols);
  const x = (col - (cols - 1) / 2) * gap;
  const z = (row - (Math.ceil(entries.length / cols) - 1) / 2) * gap;
  const slot = new THREE.Group(); slot.position.set(x, 0.2, z); scene.add(slot);

  const axes = new THREE.AxesHelper(0.25); axes.visible = false; slot.add(axes);

  const lbl = document.createElement('div'); lbl.className = 'lbl';
  const r = spec.rot.map(v => (v / Math.PI).toFixed(2) + 'π').join(', ');
  lbl.innerHTML = `${type}<br><small>${spec.file}.glb · rot[${r}]</small>`;
  labelsEl.appendChild(lbl);
  cells.push({ slot, lbl });

  loader.load('/models/' + spec.file + '.glb', (g) => {
    slot.add(fitClone(g.scene, spec.fit, spec.rot));
    loaded++;
    document.getElementById('status').textContent = `${loaded}/${entries.length} modèles chargés`;
  }, undefined, () => {
    document.getElementById('status').textContent = `Erreur de chargement: ${spec.file}.glb`;
  });
});

let autoRotate = true, showAxes = false;
addEventListener('keydown', (e) => {
  if (e.key === 'r' || e.key === 'R') autoRotate = !autoRotate;
  if (e.key === 'a' || e.key === 'A') { showAxes = !showAxes; scene.traverse(o => { if (o.type === 'AxesHelper') o.visible = showAxes; }); }
});
addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight; camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

const v = new THREE.Vector3();
function tick() {
  requestAnimationFrame(tick);
  controls.update();
  for (const { slot, lbl } of cells) {
    if (autoRotate) slot.children.forEach(ch => { if (ch.type !== 'AxesHelper') ch.rotation.y += 0.01; });
    v.set(slot.position.x, slot.position.y - 0.35, slot.position.z).project(camera);
    lbl.style.left = (v.x * 0.5 + 0.5) * innerWidth + 'px';
    lbl.style.top = (-v.y * 0.5 + 0.5) * innerHeight + 'px';
    lbl.style.display = v.z < 1 ? 'block' : 'none';
  }
  renderer.render(scene, camera);
}
tick();
</script>
</body>
</html>
