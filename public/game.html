<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Zombie Survival</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<!-- Overlay portrait -->
<div id="rotate-screen">
  <div>
    <div id="rotate-icon">📱</div>
    <p>Tournez votre écran<br>en mode paysage</p>
  </div>
</div>

<div id="connecting-screen">Connexion au serveur...</div>

<canvas id="game-canvas"></canvas>

<!-- HUD -->
<div id="hud">
  <div id="health-bar-wrap">
    <span id="health-icon">❤️</span>
    <div id="health-bar-bg"><div id="health-bar"></div></div>
    <span id="health-text">100</span>
  </div>
  <div id="hunger-bar-wrap">
    <span style="font-size:1rem">🍗</span>
    <div id="hunger-bar-bg"><div id="hunger-bar"></div></div>
    <span id="hunger-text" class="stat-text">80</span>
  </div>
  <div id="thirst-bar-wrap">
    <span style="font-size:1rem">💧</span>
    <div id="thirst-bar-bg"><div id="thirst-bar"></div></div>
    <span id="thirst-text" class="stat-text">80</span>
  </div>
  <div id="status-effects"></div>
  <div id="kills-display">☠️ <span id="kills-count">0</span></div>
  <div id="ammo-display">🔫 <span id="ammo-count">30</span></div>
  <div id="crosshair"></div>
  <div id="damage-flash"></div>
  <div id="wave-banner"></div>
</div>

<!-- Mobile zones -->
<div id="left-zone"></div>
<div id="right-zone"></div>

<!-- Boutons flottants (après les zones pour être au-dessus) -->
<button id="logout-btn" onclick="ZS.logout()">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
    <polyline points="16 17 21 12 16 7"/>
    <line x1="21" y1="12" x2="9" y2="12"/>
  </svg>
</button>
<button id="jump-btn">⬆</button>
<button id="shoot-btn">🔫</button>
<button id="craft-btn" title="Artisanat [C]">⚒</button>
<button id="inv-btn"   title="Inventaire [I]" onclick="ZS.Inventory.togglePanel()">🎒</button>

<!-- Hotbar -->
<div id="hotbar"></div>

<!-- Use item button (visible when consumable/ammo selected) -->
<button id="use-btn" style="display:none">Utiliser</button>

<!-- Pickup notification -->
<div id="pickup-notif"></div>

<!-- Map overlay -->
<div id="map-overlay" style="display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.72);align-items:center;justify-content:center;flex-direction:column;">
  <div style="position:relative;padding:18px;background:#c8b060;border:4px solid #7a5020;box-shadow:0 0 60px rgba(0,0,0,0.6),inset 0 0 30px rgba(0,0,0,0.12);transform:rotate(-0.6deg);max-width:96vw;">
    <canvas id="map-canvas" width="800" height="580" style="display:block;max-width:100%;max-height:78vh;"></canvas>
    <button id="map-close-btn" style="position:absolute;top:8px;right:8px;background:rgba(60,30,8,0.85);color:#e8d090;border:1px solid #8a6030;padding:5px 12px;cursor:pointer;font-size:13px;font-family:Georgia,serif;">✕ Fermer [M]</button>
  </div>
  <p style="color:#d4b860;font-family:Georgia,serif;font-size:12px;margin-top:8px;opacity:0.7;">Appuyez sur M ou cliquez en dehors pour fermer</p>
</div>

<!-- Death screen -->
<div id="death-screen">
  <h2>MORT</h2>
  <p id="death-kills"></p>
  <button id="respawn-btn">Réapparaître</button>
</div>

<!-- Libraries -->
<script src="/socket.io/socket.io.js"></script>
<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>

<!-- Game modules (order matters) -->
<script src="/js/items.js"></script>
<script src="/js/survival.js"></script>
<script src="/js/craft.js"></script>
<script src="/js/noise.js"></script>
<script src="/js/buildings.js"></script>
<script src="/js/sector_01_forest.js"></script>
<script src="/js/sector_02_town.js"></script>
<script src="/js/sector_03_maincity.js"></script>
<script src="/js/sector_05_military.js"></script>
<script src="/js/world.js"></script>
<script src="/js/player.js"></script>
<script src="/js/zombie.js"></script>
<script src="/js/network.js"></script>
<script src="/js/ui.js"></script>
<script src="/js/inventory.js"></script>
<script src="/js/map.js"></script>
<script src="/js/game.js"></script>

</body>
</html>
